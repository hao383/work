<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nike — Just Do It · Poster</title>
<style>
  /* ============================================================
     Nike-style sneaker poster (tribute / design study)
     Single file · vector artwork · print-ready 2:3 poster ratio
     ============================================================ */
  :root{
    --ink:#0a0a0a;
    --paper:#f4f1ea;
    --volt:#d8ff00;     /* Nike "Volt" accent */
    --orange:#ff5b15;
    --white:#ffffff;
    --font:"Helvetica Neue",Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#1b1b1b;font-family:var(--font);}
  body{display:grid;place-items:center;min-height:100vh;padding:28px;}

  /* ---- Poster canvas: fixed 2:3 ratio, scales down on small screens ---- */
  .poster{
    position:relative;
    width:680px;
    max-width:100%;
    aspect-ratio:2/3;
    background:var(--paper);
    color:var(--ink);
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.55);
    isolation:isolate;
  }

  /* ---- Background graphics ---- */
  .bg-block{
    position:absolute;inset:0;z-index:0;
    background:
      radial-gradient(120% 80% at 80% 0%, rgba(216,255,0,.20), transparent 55%),
      linear-gradient(160deg,#fafafa 0%, var(--paper) 60%, #e7e2d6 100%);
  }
  /* Giant diagonal orange swash */
  .swash{
    position:absolute;z-index:1;
    left:-12%;bottom:-6%;
    width:130%;height:46%;
    background:linear-gradient(110deg,var(--orange),#ff7a3c);
    transform:rotate(-12deg);
    box-shadow:0 -10px 40px rgba(255,91,21,.35);
  }
  /* Oversized faint background word */
  .ghost-word{
    position:absolute;z-index:1;
    top:7%;left:-4%;
    font-size:170px;font-weight:900;font-style:italic;
    letter-spacing:-.05em;line-height:.8;
    color:rgba(10,10,10,.05);
    white-space:nowrap;text-transform:uppercase;
  }

  /* ---- Top brand bar ---- */
  .brand{
    position:absolute;z-index:5;top:38px;left:44px;right:44px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .brand .swoosh{width:96px;color:var(--ink);}
  .brand .tag{
    font-size:12px;font-weight:800;letter-spacing:.32em;
    text-transform:uppercase;color:var(--ink);
  }

  /* ---- Sneaker artwork ---- */
  .shoe{
    position:absolute;z-index:4;
    left:50%;top:42%;
    width:78%;
    transform:translate(-50%,-50%) rotate(-8deg);
    filter:drop-shadow(0 26px 30px rgba(0,0,0,.30));
  }
  .shoe-disc{
    position:absolute;z-index:2;
    left:50%;top:42%;
    width:74%;aspect-ratio:1/1;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle at 50% 40%,var(--volt),#aacc00 70%,#94b300);
    box-shadow:0 20px 60px rgba(170,204,0,.45);
  }

  /* ---- Headline block ---- */
  .headline{
    position:absolute;z-index:6;
    left:44px;right:44px;bottom:120px;
    color:var(--white);
  }
  .headline h1{
    font-size:104px;font-weight:900;font-style:italic;
    line-height:.82;letter-spacing:-.04em;text-transform:uppercase;
    text-shadow:0 4px 18px rgba(0,0,0,.25);
  }
  .headline h1 .out{color:var(--white);}
  .kick{
    margin-top:16px;
    font-size:14px;font-weight:700;letter-spacing:.18em;
    text-transform:uppercase;color:var(--white);
    display:flex;align-items:center;gap:12px;
  }
  .kick::before{content:"";width:42px;height:3px;background:var(--volt);display:inline-block;}

  /* ---- Footer line ---- */
  .footer{
    position:absolute;z-index:6;left:44px;right:44px;bottom:40px;
    display:flex;align-items:center;justify-content:space-between;
    color:var(--white);font-size:12px;font-weight:700;letter-spacing:.2em;
    text-transform:uppercase;
  }
  .footer .swoosh{width:54px;color:var(--white);}

  /* ---- Responsive type scaling for small screens ---- */
  @media (max-width:560px){
    .ghost-word{font-size:120px;}
    .headline h1{font-size:74px;}
    .brand{top:26px;left:28px;right:28px;}
    .headline{left:28px;right:28px;bottom:96px;}
    .footer{left:28px;right:28px;bottom:28px;}
  }
  @media print{
    html,body{background:#fff;}
    body{padding:0;}
    .poster{box-shadow:none;width:100%;}
  }
</style>
</head>
<body>
  <div class="poster" role="img" aria-label="Nike Just Do It sneaker poster">
    <div class="bg-block"></div>
    <div class="ghost-word">Air</div>
    <div class="swash"></div>
    <div class="shoe-disc"></div>

    <!-- top brand row -->
    <div class="brand">
      <!-- Nike Swoosh (vector) -->
      <svg class="swoosh" viewBox="0 0 192 69" fill="currentColor" aria-hidden="true">
        <path d="M189.2 0.6c-1.6 0.1-3.2 0.5-4.8 1.1C170.8 7 39.6 62.4 30.9 66.1c-5.5 2.3-10.1 2.6-13.6 1.6-3.8-1.1-6.6-3.7-8.4-6.6-2.3-3.7-2.9-8.1-1.9-12.1 1-4.1 3.6-7.9 7.6-10.6 0 0-2.6 4.3-2.1 9 0.5 5 3.9 8.3 9.6 8.3 4 0 8.5-1.2 13.9-3.4 6.1-2.5 147.3-63.4 147.3-63.4s4.5-2 9.9-1.7z"/>
      </svg>
      <span class="tag">Just Do It</span>
    </div>

    <!-- Sneaker artwork (stylized side-profile vector) -->
    <svg class="shoe" viewBox="0 0 540 300" aria-hidden="true">
      <defs>
        <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#2b2b2b"/>
          <stop offset="1" stop-color="#000000"/>
        </linearGradient>
        <linearGradient id="sole" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#ffffff"/>
          <stop offset="1" stop-color="#dcdcdc"/>
        </linearGradient>
      </defs>

      <!-- midsole / foam -->
      <path d="M44 246 C34 232 40 214 60 210 C140 196 220 204 300 206
               C370 208 420 202 486 208 C508 210 516 226 508 240
               C502 250 488 252 474 252 L66 252 C54 252 48 250 44 246 Z"
            fill="url(#sole)" stroke="#111" stroke-width="3"/>
      <!-- outsole tread ticks -->
      <g stroke="#c9c9c9" stroke-width="3">
        <line x1="92"  y1="238" x2="92"  y2="252"/>
        <line x1="152" y1="240" x2="152" y2="252"/>
        <line x1="212" y1="240" x2="212" y2="252"/>
        <line x1="292" y1="240" x2="292" y2="252"/>
        <line x1="362" y1="238" x2="362" y2="252"/>
      </g>
      <!-- heel Air bubble -->
      <ellipse cx="452" cy="230" rx="34" ry="15" fill="#d8ff00" stroke="#111" stroke-width="3"/>

      <!-- upper body -->
      <path d="M70 210 C66 168 92 150 120 138 C150 126 180 120 210 118
               C250 116 272 118 300 122 C340 128 372 140 404 152
               C366 172 300 200 240 206 C180 210 120 212 70 210 Z"
            fill="url(#body)" stroke="#000" stroke-width="3"/>
      <!-- heel collar / counter -->
      <path d="M300 122 C322 96 358 92 382 106 C402 118 410 142 405 164
               C393 152 372 144 356 148 C336 136 316 128 300 122 Z"
            fill="#161616" stroke="#000" stroke-width="3"/>
      <!-- tongue -->
      <path d="M250 120 C254 104 268 100 280 104 L288 126 C274 122 262 120 250 120 Z"
            fill="#1f1f1f" stroke="#000" stroke-width="2"/>
      <!-- laces -->
      <g stroke="#d8ff00" stroke-width="5" stroke-linecap="round">
        <line x1="206" y1="142" x2="246" y2="134"/>
        <line x1="210" y1="156" x2="252" y2="148"/>
        <line x1="218" y1="170" x2="258" y2="162"/>
      </g>
      <!-- toe cap stitch -->
      <path d="M120 200 C112 176 120 156 142 144" fill="none" stroke="#3a3a3a" stroke-width="3"/>

      <!-- side Swoosh -->
      <path d="M120 198 C210 180 330 156 440 150 C470 148 480 156 470 168
               C430 168 360 176 300 184 C240 192 170 200 130 202
               C122 202 118 200 120 198 Z"
            fill="#ff5b15"/>
    </svg>

    <!-- headline -->
    <div class="headline">
      <h1><span class="out">Just</span><br>Do It.</h1>
      <p class="kick">Move Different · Air Series</p>
    </div>

    <!-- footer -->
    <div class="footer">
      <span>Nike · 2026</span>
      <svg class="swoosh" viewBox="0 0 192 69" fill="currentColor" aria-hidden="true">
        <path d="M189.2 0.6c-1.6 0.1-3.2 0.5-4.8 1.1C170.8 7 39.6 62.4 30.9 66.1c-5.5 2.3-10.1 2.6-13.6 1.6-3.8-1.1-6.6-3.7-8.4-6.6-2.3-3.7-2.9-8.1-1.9-12.1 1-4.1 3.6-7.9 7.6-10.6 0 0-2.6 4.3-2.1 9 0.5 5 3.9 8.3 9.6 8.3 4 0 8.5-1.2 13.9-3.4 6.1-2.5 147.3-63.4 147.3-63.4s4.5-2 9.9-1.7z"/>
      </svg>
    </div>
  </div>
</body>
</html>
